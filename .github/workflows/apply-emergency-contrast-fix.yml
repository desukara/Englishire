name: Apply emergency contrast fix

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Apply verified page-specific contrast rules
        run: |
          cat >> style.css <<'CSS'

/* EMERGENCY PAGE-SPECIFIC CONTRAST CORRECTION */

/* Homepage principle panel is light, not dark. */
.englishire-principle,
.englishire-principle :is(h1, h2, h3, h4, p, li, dd, strong, span) {
  color: var(--royal-navy) !important;
}

.englishire-principle :is(.section-label, .eyebrow, .about-englishire__wordmark) {
  color: var(--crimson-deep) !important;
}

.englishire-principle .homepage-standard-link {
  color: var(--royal-navy) !important;
  background: var(--ivory-light) !important;
  border-color: var(--royal-navy) !important;
}

.englishire-principle .homepage-standard-link:hover,
.englishire-principle .homepage-standard-link:focus-visible {
  color: var(--white) !important;
  background: var(--royal-navy) !important;
  border-color: var(--royal-navy) !important;
}

/* Actual dark panels used on index, teacher-cover, how-it-works, journal and about. */
:is(
  .service-situations,
  .about-englishire:not(.englishire-principle),
  #englishire-about-section,
  .early-contact,
  .enquiry-strip,
  .journal-masthead,
  .journal-feature,
  .journal-start,
  .journal-standard-panel,
  .service-standard,
  .decision-section,
  .standard-feature,
  .continue-reading
) {
  color: var(--ivory-light) !important;
}

:is(
  .service-situations,
  .about-englishire:not(.englishire-principle),
  #englishire-about-section,
  .early-contact,
  .enquiry-strip,
  .journal-masthead,
  .journal-feature,
  .journal-start,
  .journal-standard-panel,
  .service-standard,
  .decision-section,
  .standard-feature,
  .continue-reading
) :is(h1, h2, h3, h4, p, li, dd, strong, blockquote, span) {
  color: var(--ivory-light) !important;
}

:is(
  .service-situations,
  .about-englishire:not(.englishire-principle),
  #englishire-about-section,
  .early-contact,
  .enquiry-strip,
  .journal-masthead,
  .journal-feature,
  .journal-start,
  .journal-standard-panel,
  .service-standard,
  .decision-section,
  .standard-feature,
  .continue-reading
) :is(.section-label, .eyebrow, .story-category, .journal-masthead__volume, .journal-masthead__kicker, .situation-item__number, .process-item__number, .journal-start__number) {
  color: var(--crown-gold-light) !important;
}

:is(
  .service-situations,
  .about-englishire:not(.englishire-principle),
  #englishire-about-section,
  .early-contact,
  .enquiry-strip,
  .journal-masthead,
  .journal-feature,
  .journal-start,
  .journal-standard-panel,
  .service-standard,
  .decision-section,
  .standard-feature,
  .continue-reading
) :is(.section-heading__summary, .situation-item__detail, .journal-feature__standfirst, .journal-masthead__subtitle, .journal-masthead__creed, .about-englishire__descriptor) {
  color: rgba(255, 255, 255, 0.88) !important;
}

:is(
  .service-situations,
  .about-englishire:not(.englishire-principle),
  #englishire-about-section,
  .early-contact,
  .enquiry-strip,
  .journal-masthead,
  .journal-feature,
  .journal-start,
  .journal-standard-panel,
  .service-standard,
  .decision-section,
  .standard-feature,
  .continue-reading
) a:not(.button) {
  color: var(--crown-gold-light) !important;
}

:is(
  .service-situations,
  .about-englishire:not(.englishire-principle),
  #englishire-about-section,
  .early-contact,
  .enquiry-strip,
  .journal-masthead,
  .journal-feature,
  .journal-start,
  .journal-standard-panel,
  .service-standard,
  .decision-section,
  .standard-feature,
  .continue-reading
) .button {
  color: var(--royal-navy-deep) !important;
  background: var(--crown-gold-light) !important;
  border-color: var(--crown-gold-light) !important;
}

:is(
  .service-situations,
  .about-englishire:not(.englishire-principle),
  #englishire-about-section,
  .early-contact,
  .enquiry-strip,
  .journal-masthead,
  .journal-feature,
  .journal-start,
  .journal-standard-panel,
  .service-standard,
  .decision-section,
  .standard-feature,
  .continue-reading
) .button:hover,
:is(
  .service-situations,
  .about-englishire:not(.englishire-principle),
  #englishire-about-section,
  .early-contact,
  .enquiry-strip,
  .journal-masthead,
  .journal-feature,
  .journal-start,
  .journal-standard-panel,
  .service-standard,
  .decision-section,
  .standard-feature,
  .continue-reading
) .button:focus-visible {
  color: var(--white) !important;
  background: var(--crimson) !important;
  border-color: var(--crimson) !important;
}
CSS
      - name: Commit correction and remove temporary workflow
        run: |
          rm .github/workflows/apply-emergency-contrast-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add style.css .github/workflows/apply-emergency-contrast-fix.yml
          git commit -m "Apply emergency page-specific contrast correction"
          git push origin HEAD:main
