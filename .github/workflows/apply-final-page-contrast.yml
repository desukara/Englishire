name: Apply final page contrast correction

on:
  push:
    branches:
      - agent/final-page-contrast

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/final-page-contrast
      - name: Append verified selector-specific contrast rules
        run: |
          cat >> style.css <<'CSS'

/* FINAL PAGE-SPECIFIC CONTRAST CORRECTION */

/* Light ceremonial principle panel on the homepage. */
.englishire-principle,
.englishire-principle h2,
.englishire-principle h3,
.englishire-principle p,
.englishire-principle li,
.englishire-principle strong,
.englishire-principle span {
  color: var(--royal-navy) !important;
}

.englishire-principle .section-label,
.englishire-principle .eyebrow,
.englishire-principle .about-englishire__wordmark {
  color: var(--crimson-deep) !important;
}

.englishire-principle .homepage-standard-link {
  color: var(--royal-navy) !important;
  background: var(--ivory-light) !important;
  border-color: var(--royal-navy) !important;
}

.englishire-principle .homepage-standard-link:hover,
.englishire-principle .homepage-standard-link:focus-visible {
  color: var(--white) !important;
  background: var(--royal-navy) !important;
  border-color: var(--royal-navy) !important;
}

/* Actual dark panels used across index, teacher cover, process, journal and about pages. */
:is(
  .service-situations,
  .about-englishire:not(.englishire-principle),
  #englishire-about-section,
  .early-contact,
  .enquiry-strip,
  .journal-masthead,
  .journal-feature,
  .journal-start,
  .journal-standard-panel,
  .service-standard,
  .decision-section,
  .standard-feature,
  .continue-reading
) {
  color: var(--ivory-light) !important;
}

:is(
  .service-situations,
  .about-englishire:not(.englishire-principle),
  #englishire-about-section,
  .early-contact,
  .enquiry-strip,
  .journal-masthead,
  .journal-feature,
  .journal-start,
  .journal-standard-panel,
  .service-standard,
  .decision-section,
  .standard-feature,
  .continue-reading
) :is(h1, h2, h3, h4, p, li, dd, strong, blockquote) {
  color: var(--ivory-light) !important;
}

:is(
  .service-situations,
  .about-englishire:not(.englishire-principle),
  #englishire-about-section,
  .early-contact,
  .enquiry-strip,
  .journal-masthead,
  .journal-feature,
  .journal-start,
  .journal-standard-panel,
  .service-standard,
  .decision-section,
  .standard-feature,
  .continue-reading
) :is(.section-label, .eyebrow, .story-category, .journal-masthead__volume, .journal-masthead__kicker, .situation-item__number, .process-item__number, .journal-start__number) {
  color: var(--crown-gold-light) !important;
}

:is(
  .service-situations,
  .about-englishire:not(.englishire-principle),
  #englishire-about-section,
  .early-contact,
  .enquiry-strip,
  .journal-masthead,
  .journal-feature,
  .journal-start,
  .journal-standard-panel,
  .service-standard,
  .decision-section,
  .standard-feature,
  .continue-reading
) :is(.section-heading__summary, .situation-item__detail, .journal-feature__standfirst, .journal-masthead__subtitle, .journal-masthead__creed, .about-englishire__descriptor) {
  color: rgba(255, 255, 255, 0.84) !important;
}

:is(
  .service-situations,
  .about-englishire:not(.englishire-principle),
  #englishire-about-section,
  .early-contact,
  .enquiry-strip,
  .journal-masthead,
  .journal-feature,
  .journal-start,
  .journal-standard-panel,
  .service-standard,
  .decision-section,
  .standard-feature,
  .continue-reading
) a:not(.button) {
  color: var(--crown-gold-light) !important;
}

:is(
  .service-situations,
  .about-englishire:not(.englishire-principle),
  #englishire-about-section,
  .early-contact,
  .enquiry-strip,
  .journal-masthead,
  .journal-feature,
  .journal-start,
  .journal-standard-panel,
  .service-standard,
  .decision-section,
  .standard-feature,
  .continue-reading
) .button {
  color: var(--royal-navy-deep) !important;
  background: var(--crown-gold-light) !important;
  border-color: var(--crown-gold-light) !important;
}

:is(
  .service-situations,
  .about-englishire:not(.englishire-principle),
  #englishire-about-section,
  .early-contact,
  .enquiry-strip,
  .journal-masthead,
  .journal-feature,
  .journal-start,
  .journal-standard-panel,
  .service-standard,
  .decision-section,
  .standard-feature,
  .continue-reading
) .button:hover,
:is(
  .service-situations,
  .about-englishire:not(.englishire-principle),
  #englishire-about-section,
  .early-contact,
  .enquiry-strip,
  .journal-masthead,
  .journal-feature,
  .journal-start,
  .journal-standard-panel,
  .service-standard,
  .decision-section,
  .standard-feature,
  .continue-reading
) .button:focus-visible {
  color: var(--white) !important;
  background: var(--crimson) !important;
  border-color: var(--crimson) !important;
}
CSS
      - name: Commit correction and remove temporary workflow
        run: |
          rm .github/workflows/apply-final-page-contrast.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add style.css .github/workflows/apply-final-page-contrast.yml
          git commit -m "Correct page-specific dark-panel contrast"
          git push origin HEAD:agent/final-page-contrast
