name: Apply final three contrast fixes

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-fixes:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Append final scoped contrast rules
        shell: bash
        run: |
          cat >> style.css <<'CSS'

          /* FINAL SCOPED CONTRAST CORRECTIONS */

          /* Homepage: readable default CTA in the dark situations panel. */
          .service-situations .section-footer-action .button--text {
            color: var(--royal-navy-deep);
            background: var(--crown-gold-light);
            border-color: var(--crown-gold-light);
          }

          .service-situations .section-footer-action .button--text:hover,
          .service-situations .section-footer-action .button--text:focus-visible {
            color: var(--white);
            background: var(--crimson);
            border-color: var(--crimson);
          }

          /* Teacher Cover: readable default Standard button in the dark feature panel. */
          .standard-feature .button--light {
            color: var(--royal-navy-deep);
            background: var(--crown-gold-light);
            border-color: var(--crown-gold-light);
          }

          .standard-feature .button--light:hover,
          .standard-feature .button--light:focus-visible {
            color: var(--white);
            background: var(--crimson);
            border-color: var(--crimson);
          }

          /* About: strengthen generated principle numbers on the pale-blue card. */
          .about-standard-card__principles li::before {
            color: var(--royal-navy-deep);
            opacity: 1;
          }
          CSS
      - name: Remove one-use workflow
        run: rm -f .github/workflows/apply-final-three-contrast-fixes.yml
      - name: Commit final scoped correction
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add style.css .github/workflows/apply-final-three-contrast-fixes.yml
          git commit -m "Apply final scoped contrast corrections"
          git push origin main
