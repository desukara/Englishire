name: Apply functionality guardrails

on:
  push:
    branches:
      - agent/site-functionality-guardrails

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/site-functionality-guardrails
          fetch-depth: 0

      - name: Apply scoped repository changes
        shell: python
        run: |
          from pathlib import Path

          articles = [
              'backup-teacher-eikaiwa.html',
              'easy-teacher.html',
              'eikaiwa-school-operations.html',
              'emergency-classroom-coverage.html',
              'hiring-foreign-teachers-in-japan.html',
              'how-schools-can-handle-staff-shortages.html',
              'real-cost-of-english-teacher-turnover.html',
              'school-collapse-after-three-decades.html',
          ]

          old = 'critical-fixes.css?v=20260720-4'
          new = 'critical-fixes.css?v=20260721-2'
          for name in articles:
              path = Path(name)
              text = path.read_text(encoding='utf-8')
              if text.count(old) != 1:
                  raise SystemExit(f'{name}: expected exactly one old cache key')
              path.write_text(text.replace(old, new), encoding='utf-8')

          obsolete = Path('.github/workflows/run-final-contrast-fix.yml')
          if obsolete.exists():
              obsolete.unlink()

          validation = '''name: Validate static site

          on:
            pull_request:
            workflow_dispatch:

          permissions:
            contents: read

          jobs:
            validate:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4

                - name: Check HTML, local assets and JSON-LD
                  continue-on-error: true
                  shell: python
                  run: |
                    from html.parser import HTMLParser
                    from pathlib import Path
                    from urllib.parse import urlsplit
                    import json, re, sys

                    allowed_missing = {'contact-image-hero.png'}
                    failures = []

                    class Parser(HTMLParser):
                        def __init__(self):
                            super().__init__(convert_charrefs=True)
                            self.ids, self.refs = [], []
                        def handle_starttag(self, tag, attrs):
                            data = dict(attrs)
                            if data.get('id'):
                                self.ids.append(data['id'])
                            key = {'a':'href','img':'src','script':'src','link':'href','source':'srcset'}.get(tag)
                            if key and data.get(key):
                                self.refs.append(data[key])

                    for page in sorted(Path('.').glob('*.html')):
                        text = page.read_text(encoding='utf-8')
                        parser = Parser()
                        try:
                            parser.feed(text)
                        except Exception as exc:
                            failures.append(f'{page}: HTML parse error: {exc}')
                            continue
                        duplicates = sorted({item for item in parser.ids if parser.ids.count(item) > 1})
                        if duplicates:
                            failures.append(f'{page}: duplicate IDs: {", ".join(duplicates)}')
                        for ref in parser.refs:
                            if ref.startswith(('http://','https://','mailto:','tel:','#','data:')):
                                continue
                            ref = ref.split(',')[0].strip().split()[0]
                            target = urlsplit(ref).path
                            if not target or target.startswith('/') or Path(target).name in allowed_missing:
                                continue
                            if not (page.parent / target).exists():
                                failures.append(f'{page}: missing local reference: {ref}')
                        pattern = r'<script[^>]+type=["\\\']application/ld\\+json["\\\'][^>]*>(.*?)</script>'
                        for block in re.findall(pattern, text, re.I | re.S):
                            try:
                                json.loads(block)
                            except json.JSONDecodeError as exc:
                                failures.append(f'{page}: invalid JSON-LD: {exc}')

                    if failures:
                        print('Advisory validation findings:')
                        print('\\n'.join(f'- {item}' for item in failures))
                        sys.exit(1)
                    print('Static-site advisory checks passed.')

                - name: Check JavaScript syntax
                  continue-on-error: true
                  run: |
                    for file in *.js; do
                      [ -e "$file" ] || continue
                      node --check "$file"
                    done
          '''
          lines = validation.splitlines()
          indent = min(len(line) - len(line.lstrip()) for line in lines if line.strip())
          Path('.github/workflows/validate-site.yml').write_text(
              '\n'.join(line[indent:] if line.strip() else '' for line in lines) + '\n',
              encoding='utf-8'
          )

          Path('.github/workflows/apply-functionality-guardrails.yml').unlink()

      - name: Commit complete guarded update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add site functionality guardrails"
          git push origin HEAD:agent/site-functionality-guardrails
