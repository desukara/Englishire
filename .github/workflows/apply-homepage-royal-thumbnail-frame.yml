name: Apply homepage royal thumbnail frame

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Strengthen homepage article thumbnail frames
        shell: python
        run: |
          from pathlib import Path

          css_path = Path("critical-fixes.css")
          css = css_path.read_text(encoding="utf-8")

          old = "\n".join([
              "/* Homepage Journal cards: give each thumbnail a clean editorial frame. */",
              "#englishire-school-media .homepage-publication__media {",
              "  border-bottom: 1px solid rgba(17, 34, 51, 0.22);",
              "}",
              "",
              "#englishire-school-media .homepage-publication__media img {",
              "  display: block;",
              "  outline: 1px solid rgba(17, 34, 51, 0.28);",
              "  outline-offset: -1px;",
              "}",
              "",
          ])

          new = "\n".join([
              "/* Homepage Journal cards: strong royal frame for closely related thumbnails. */",
              "#englishire-school-media .homepage-publication__media {",
              "  position: relative;",
              "  border-bottom: 1px solid rgba(17, 34, 51, 0.22);",
              "}",
              "",
              "#englishire-school-media .homepage-publication__media img {",
              "  display: block;",
              "}",
              "",
              "#englishire-school-media .homepage-publication__media::after {",
              "  content: \"\";",
              "  position: absolute;",
              "  inset: 0;",
              "  z-index: 1;",
              "  pointer-events: none;",
              "  border: 4px solid #071a35;",
              "  box-shadow:",
              "    inset 0 0 0 2px #e2ca8b,",
              "    inset 0 0 0 5px #071a35,",
              "    inset 0 0 0 7px #9f1528;",
              "}",
              "",
          ])

          if css.count(old) != 1:
              raise SystemExit(f"Expected one existing homepage thumbnail frame block, found {css.count(old)}")

          css_path.write_text(css.replace(old, new, 1), encoding="utf-8")

          index_path = Path("index.html")
          index = index_path.read_text(encoding="utf-8")
          old_key = "critical-fixes.css?v=20260721-2"
          new_key = "critical-fixes.css?v=20260721-3"
          if index.count(old_key) != 1:
              raise SystemExit(f"Expected one homepage cache key, found {index.count(old_key)}")
          index_path.write_text(index.replace(old_key, new_key, 1), encoding="utf-8")

          final_css = css_path.read_text(encoding="utf-8")
          required = [
              "position: relative;",
              "border: 4px solid #071a35;",
              "inset 0 0 0 2px #e2ca8b",
              "inset 0 0 0 7px #9f1528",
          ]
          for item in required:
              if item not in final_css:
                  raise SystemExit(f"Missing expected frame declaration: {item}")

      - name: Remove this one-use workflow
        run: rm .github/workflows/apply-homepage-royal-thumbnail-frame.yml

      - name: Commit homepage thumbnail frame
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add critical-fixes.css index.html .github/workflows/apply-homepage-royal-thumbnail-frame.yml
          git commit -m "Strengthen homepage article thumbnail frames"
          git push origin HEAD:main
