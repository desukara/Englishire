name: Apply Standard button fix

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-standard-button-fix.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply site-wide Standard button correction
        shell: bash
        run: |
          cat >> critical-fixes.css <<'CSS'

          /* Site-wide Englishire Standard CTA: readable before hover on every page. */
          a.button[href="englishire-standard.html"] {
            color: #071a35 !important;
            background: #e2ca8b !important;
            border-color: #c7a052 !important;
          }

          a.button[href="englishire-standard.html"]:hover,
          a.button[href="englishire-standard.html"]:focus-visible {
            color: #ffffff !important;
            background: #9f1528 !important;
            border-color: #9f1528 !important;
          }
          CSS

          python3 - <<'PY'
          from pathlib import Path

          for path in Path('.').glob('*.html'):
              text = path.read_text(encoding='utf-8')
              if 'critical-fixes.css' in text:
                  import re
                  text = re.sub(r'critical-fixes\.css\?v=[^"\']+', 'critical-fixes.css?v=20260720-4', text)
              elif '<link rel="stylesheet" href="style.css' in text:
                  import re
                  text = re.sub(
                      r'(<link rel="stylesheet" href="style\.css(?:\?v=[^"\']+)?"\s*/?>)',
                      r'\1\n    <link rel="stylesheet" href="critical-fixes.css?v=20260720-4" />',
                      text,
                      count=1,
                  )
              path.write_text(text, encoding='utf-8')
          PY

          rm .github/workflows/apply-standard-button-fix.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add critical-fixes.css *.html .github/workflows/apply-standard-button-fix.yml
          git commit -m "Apply site-wide Standard button correction"
          git push
