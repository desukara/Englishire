name: Build discoverability infrastructure

on:
  push:
    branches: [agent/discoverability-infrastructure]
    paths: [.github/workflows/build-discoverability.yml]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/discoverability-infrastructure
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Generate discovery and institutional files
        run: |
          cat > /tmp/build_discovery.py <<'PY'
          from pathlib import Path
          from datetime import datetime, timezone
          from email.utils import format_datetime
          from html import escape
          import json, re, subprocess
          from urllib.parse import urljoin

          ROOT = Path('.')
          BASE = 'https://englishire.com/'
          EMAIL = 'info@englishire.com'
          ARTICLES = [
              'backup-teacher-eikaiwa.html',
              'easy-teacher.html',
              'eikaiwa-school-operations.html',
              'emergency-classroom-coverage.html',
              'hiring-foreign-teachers-in-japan.html',
              'how-schools-can-handle-staff-shortages.html',
              'real-cost-of-english-teacher-turnover.html',
              'school-collapse-after-three-decades.html',
          ]
          INSTITUTIONAL = ['accessibility.html', 'editorial-policy.html', 'permissions.html']

          def read(path): return Path(path).read_text(encoding='utf-8')
          def write(path, text):
              p = Path(path); p.parent.mkdir(parents=True, exist_ok=True)
              p.write_text(text, encoding='utf-8', newline='\n')
          def first(pattern, text, flags=re.I|re.S, default=''):
              m = re.search(pattern, text, flags)
              return re.sub(r'\s+', ' ', m.group(1)).strip() if m else default
          def meta(text, key, attr='name'):
              return first(r'<meta\b[^>]*\b%s=["\']%s["\'][^>]*\bcontent=["\']([^"\']*)["\'][^>]*>' % (attr, re.escape(key)), text) or first(r'<meta\b[^>]*\bcontent=["\']([^"\']*)["\'][^>]*\b%s=["\']%s["\'][^>]*>' % (attr, re.escape(key)), text)
          def canonical(text, filename):
              return first(r'<link\b[^>]*rel=["\']canonical["\'][^>]*href=["\']([^"\']+)', text) or (BASE if filename == 'index.html' else BASE + filename)
          def json_date(text, key):
              return first(r'["\']%s["\']\s*:\s*["\']([^"\']+)' % key, text)
          def git_date(path):
              out = subprocess.check_output(['git','log','-1','--format=%cI','--',path], text=True).strip()
              return (out[:10] if out else '2026-07-22')
          def title(text): return first(r'<title[^>]*>(.*?)</title>', text)
          def og(text, prop): return meta(text, prop, 'property')
          def noindex(text): return 'noindex' in meta(text, 'robots').lower()
          def xml(s): return escape(str(s), quote=True)
          def strip_html(s): return re.sub(r'\s+', ' ', re.sub(r'<[^>]+>', ' ', s)).strip()

          def institutional_page(filename, page_title, description, label, heading, paragraphs, extra=''):
              url = BASE + filename
              body = '\n'.join(f'<p>{p}</p>' for p in paragraphs)
              return f'''<!DOCTYPE html>
          <html lang="en-GB">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>{page_title} | Englishire</title>
            <meta name="description" content="{description}" />
            <meta name="robots" content="index, follow" />
            <link rel="canonical" href="{url}" />
            <link rel="icon" href="favicon.ico" sizes="any" />
            <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
            <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
            <link rel="stylesheet" href="style.css" />
            <script src="script.js" defer></script>
            <script type="application/ld+json">{{"@context":"https://schema.org","@type":"WebPage","name":{json.dumps(page_title)},"description":{json.dumps(description)},"url":{json.dumps(url)},"isPartOf":{{"@type":"WebSite","name":"Englishire","url":"{BASE}"}},"publisher":{{"@type":"Organization","name":"Englishire","url":"{BASE}","email":"{EMAIL}"}}}}</script>
          </head>
          <body>
            <a class="skip-link" href="#englishire-main-content">Skip to main content</a>
            <header class="site-header"><div class="site-shell site-header__inner"><a class="masthead" href="index.html" aria-label="Englishire homepage"><img class="masthead__logo" src="englishire-logo.png" width="1327" height="380" alt="Englishire" /></a><nav class="primary-nav" aria-label="Primary navigation"><a href="teacher-cover.html">Teacher Cover</a><a href="how-it-works.html">How It Works</a><a href="journal.html">Journal</a><a href="about.html">About</a><a class="primary-nav__enquiry" href="contact.html">Request Teacher Cover</a></nav></div></header>
            <main id="englishire-main-content">
              <section class="service-hero"><div class="site-shell"><div class="service-hero__content"><p class="eyebrow">{label}</p><h1>{heading}</h1><p class="service-hero__lead">{description}</p></div></div></section>
              <section class="service-introduction"><div class="site-shell service-introduction__layout"><div class="service-introduction__heading"><p class="section-label">Englishire</p><h2>{page_title}</h2></div><div class="service-introduction__copy">{body}{extra}</div></div></section>
            </main>
            <footer class="site-footer"><div class="site-shell site-footer__top"><div class="site-footer__brand"><a class="site-footer__masthead" href="index.html"><img src="englishire-logo.png" width="1327" height="380" alt="Englishire" /><span class="site-footer__descriptor">Temporary Teacher Cover · Tokyo</span></a><p class="site-footer__statement">Temporary English teacher cover for Tokyo schools.</p></div><nav class="site-footer__navigation" aria-label="Footer service navigation"><p class="site-footer__navigation-title">Services</p><a href="teacher-cover.html">Teacher Cover</a><a href="how-it-works.html">How It Works</a><a href="contact.html">Request Teacher Cover</a></nav><nav class="site-footer__navigation" aria-label="Footer company navigation"><p class="site-footer__navigation-title">Englishire</p><a href="about.html">About</a><a href="journal.html">Journal</a><a href="questions.html">Questions</a><a href="contact.html">Contact</a></nav><div class="site-footer__contact"><p class="site-footer__navigation-title">Enquiries</p><p>Email <a href="mailto:{EMAIL}">{EMAIL}</a>.</p></div></div><div class="site-shell site-footer__bottom"><p>© <span id="englishire-current-year">2026</span> Englishire. All rights reserved.</p><div class="site-footer__legal"><a href="privacy.html">Privacy</a><a href="terms.html">Terms</a><a href="cookies.html">Cookies</a><a href="accessibility.html">Accessibility</a><a href="editorial-policy.html">Editorial Policy</a><a href="permissions.html">Permissions</a></div></div></footer>
          </body>
          </html>'''

          write('accessibility.html', institutional_page(
              'accessibility.html','Accessibility Statement',
              'Englishire’s accessibility approach, known limitations and contact route for assistance.',
              'Accessibility','A clear website should be usable by as many people as possible.',[
              'Englishire aims to provide a website that is perceivable, operable, understandable and robust across current browsers, devices and assistive technologies.',
              'The website is developed with semantic HTML, keyboard access, visible focus states, descriptive link text, alternative text for meaningful images and responsive layouts. Englishire uses WCAG 2.2 Level AA as its working reference rather than claiming formal certification.',
              'Some historic images, third-party services or older documents may present limitations. We review reported barriers and prioritise practical corrections.',
              f'If any page, form or document is difficult to use, email <a href="mailto:{EMAIL}">{EMAIL}</a> and identify the page, device, browser and difficulty encountered. We will provide the information in a reasonable alternative format where possible.',
              'This statement was last reviewed on 22 July 2026.'
          ]))
          write('editorial-policy.html', institutional_page(
              'editorial-policy.html','Englishire Journal Editorial Policy',
              'The editorial, authorship, correction and attribution standards followed by Englishire Journal.',
              'Englishire Journal','Independent writing, clear attribution and a visible correction record.',[
              'Englishire Journal publishes analysis and commentary on English education, school operations, staffing and continuity. Articles are selected for relevance, clarity and practical value rather than search volume alone.',
              'Authorship is stated on each publication. Sources, institutions, historical landmarks and images are identified where that information is material and can be established responsibly.',
              'Published article prose is preserved as part of the publication record. Material factual errors may be corrected, but substantive corrections should be dated and explained rather than silently altering the record.',
              'Commercial service pages and editorial publications serve different purposes. Englishire Journal may inform the organisation’s work, but articles are not presented as contractual advice or a guarantee of service availability.',
              f'Questions, correction requests and attribution concerns may be sent to <a href="mailto:{EMAIL}">{EMAIL}</a>.'
          ]))
          write('permissions.html', institutional_page(
              'permissions.html','Copyright and Permissions',
              'Copyright, quotation, linking and permission guidance for Englishire and Englishire Journal.',
              'Copyright and Permissions','Link freely. Quote fairly. Ask before reproducing substantial work.',[
              'Englishire welcomes accurate links to its service pages and Englishire Journal articles. Links should point to the canonical page and should not imply endorsement or partnership.',
              'Brief quotations may be used for commentary, review, teaching or research where permitted by law, with clear attribution to Englishire Journal and a link to the original publication.',
              'Substantial reproduction, republication, commercial reuse, translation, adaptation or use of Englishire branding requires prior written permission. Image rights may belong to third parties and are not automatically licensed with the surrounding article.',
              f'Permission requests should describe the material, intended use, format, audience and publication date and be sent to <a href="mailto:{EMAIL}">{EMAIL}</a>.'
          ]))

          article_items = []
          for fn in ARTICLES:
              t = read(fn)
              url = canonical(t, fn)
              ttl = og(t,'og:title') or title(t).split('|')[0].strip()
              desc = og(t,'og:description') or meta(t,'description')
              image = og(t,'og:image')
              published = json_date(t,'datePublished') or git_date(fn)
              modified = json_date(t,'dateModified') or git_date(fn)
              author = first(r'itemprop=["\']author["\'][^>]*>(.*?)</', t) or first(r'By\s+([^<|]+)', t) or 'James Simmons'
              article_items.append(dict(file=fn,url=url,title=ttl,description=desc,image=image,published=published,modified=modified,author=strip_html(author)))
          article_items.sort(key=lambda x:x['published'], reverse=True)

          now = datetime(2026,7,22,0,0,0,tzinfo=timezone.utc)
          rss_items=[]
          for a in article_items:
              try: d=datetime.fromisoformat(a['published'].replace('Z','+00:00'))
              except: d=datetime.fromisoformat(a['published'][:10]+'T00:00:00+00:00')
              enclosure = f'<enclosure url="{xml(a["image"])}" type="image/{a["image"].rsplit(".",1)[-1].lower().replace("jpg","jpeg")}" />' if a['image'] else ''
              rss_items.append(f'''    <item><title>{xml(a['title'])}</title><link>{xml(a['url'])}</link><guid isPermaLink="true">{xml(a['url'])}</guid><pubDate>{format_datetime(d)}</pubDate><dc:creator>{xml(a['author'])}</dc:creator><description>{xml(a['description'])}</description>{enclosure}</item>''')
          write('feed.xml', f'''<?xml version="1.0" encoding="UTF-8"?>\n<rss version="2.0" xmlns:atom="http://www.w3.org/2005/Atom" xmlns:dc="http://purl.org/dc/elements/1.1/"><channel><title>Englishire Journal</title><link>{BASE}journal.html</link><description>Analysis and commentary on English education, school operations, staffing and continuity.</description><language>en-GB</language><lastBuildDate>{format_datetime(now)}</lastBuildDate><atom:link href="{BASE}feed.xml" rel="self" type="application/rss+xml" />\n'''+'\n'.join(rss_items)+'\n</channel></rss>')
          write('feed.json', json.dumps({
              'version':'https://jsonfeed.org/version/1.1','title':'Englishire Journal','home_page_url':BASE+'journal.html','feed_url':BASE+'feed.json','description':'Analysis and commentary on English education, school operations, staffing and continuity.','language':'en-GB','authors':[{'name':'Englishire Journal','url':BASE+'journal.html'}],
              'items':[{'id':a['url'],'url':a['url'],'title':a['title'],'summary':a['description'],'image':a['image'] or None,'date_published':a['published'],'date_modified':a['modified'],'authors':[{'name':a['author']}]} for a in article_items]
          },ensure_ascii=False,indent=2)+'\n')

          html_files=sorted(ROOT.glob('*.html'))
          indexed=[]
          images=[]
          for p in html_files:
              t=read(p)
              if p.name in ('404.html','thank-you.html') or noindex(t): continue
              indexed.append((p.name,canonical(t,p.name),git_date(p.name)))
              for m in re.finditer(r'<figure\b[^>]*>(.*?)</figure>',t,re.I|re.S):
                  block=m.group(1); src=first(r'<img\b[^>]*src=["\']([^"\']+)',block); alt=first(r'<img\b[^>]*alt=["\']([^"\']*)',block); cap=strip_html(first(r'<figcaption[^>]*>(.*?)</figcaption>',block))
                  if src and not src.startswith(('http:','https:','data:')): images.append((canonical(t,p.name),urljoin(BASE,src),alt,cap))

          journal_names={'journal.html',*ARTICLES}
          pages=[x for x in indexed if x[0] not in journal_names]
          journals=[x for x in indexed if x[0] in journal_names]
          def urlset(rows): return '<?xml version="1.0" encoding="UTF-8"?>\n<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n'+'\n'.join(f'  <url><loc>{xml(u)}</loc><lastmod>{d}</lastmod></url>' for _,u,d in rows)+'\n</urlset>\n'
          write('sitemap-pages.xml',urlset(pages))
          write('sitemap-journal.xml',urlset(journals))
          image_entries=[]
          for page,img,alt,cap in images:
              fields=[f'<image:loc>{xml(img)}</image:loc>']
              if alt: fields.append(f'<image:title>{xml(alt)}</image:title>')
              if cap: fields.append(f'<image:caption>{xml(cap)}</image:caption>')
              image_entries.append(f'  <url><loc>{xml(page)}</loc><image:image>{"".join(fields)}</image:image></url>')
          write('sitemap-images.xml','<?xml version="1.0" encoding="UTF-8"?>\n<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9" xmlns:image="http://www.google.com/schemas/sitemap-image/1.1">\n'+'\n'.join(image_entries)+'\n</urlset>\n')
          write('sitemap.xml','''<?xml version="1.0" encoding="UTF-8"?>
          <sitemapindex xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
            <sitemap><loc>https://englishire.com/sitemap-pages.xml</loc><lastmod>2026-07-22</lastmod></sitemap>
            <sitemap><loc>https://englishire.com/sitemap-journal.xml</loc><lastmod>2026-07-22</lastmod></sitemap>
            <sitemap><loc>https://englishire.com/sitemap-images.xml</loc><lastmod>2026-07-22</lastmod></sitemap>
          </sitemapindex>
          ''')
          write('robots.txt','User-agent: *\nAllow: /\n\nSitemap: https://englishire.com/sitemap.xml\n')
          write('.well-known/security.txt',f'''Contact: mailto:{EMAIL}\nExpires: 2027-07-22T00:00:00Z\nPreferred-Languages: en\nCanonical: {BASE}.well-known/security.txt\nPolicy: {BASE}terms.html\n''')
          write('humans.txt',f'''/* ORGANISATION */\nName: Englishire\nLocation: Tokyo, Japan\nContact: {EMAIL}\n\n/* PUBLICATION */\nName: Englishire Journal\nLanguage: British English\nEditorial policy: {BASE}editorial-policy.html\n\n/* SITE */\nCanonical: {BASE}\nAccessibility: {BASE}accessibility.html\nSecurity: {BASE}.well-known/security.txt\n''')
          llms=['# Englishire','','> Englishire provides temporary English teacher cover for schools and English-language education providers in Tokyo.','','## Primary service pages',f'- [Homepage]({BASE})',f'- [Teacher Cover]({BASE}teacher-cover.html)',f'- [How It Works]({BASE}how-it-works.html)',f'- [Englishire Standard]({BASE}englishire-standard.html)',f'- [Questions]({BASE}questions.html)',f'- [Request Teacher Cover]({BASE}contact.html)','','## Englishire Journal',f'- [Journal index]({BASE}journal.html)',f'- [RSS feed]({BASE}feed.xml)',f'- [JSON Feed]({BASE}feed.json)']
          llms += [f'- [{a["title"]}]({a["url"]}): {a["description"]}' for a in article_items]
          llms += ['','## Institutional information',f'- [About]({BASE}about.html)',f'- [Accessibility]({BASE}accessibility.html)',f'- [Editorial policy]({BASE}editorial-policy.html)',f'- [Copyright and permissions]({BASE}permissions.html)',f'- [Privacy]({BASE}privacy.html)',f'- [Terms]({BASE}terms.html)','','## Contact',f'- Email: {EMAIL}','','Englishire Journal is the publication name. Content is written in British English. Canonical URLs above should be preferred when citing or linking.']
          write('llms.txt','\n'.join(llms)+'\n')
          write('llms-full.txt','\n'.join(llms+["","## Machine-readable discovery",f'- [Sitemap index]({BASE}sitemap.xml)',f'- [Image sitemap]({BASE}sitemap-images.xml)',f'- [Security contact]({BASE}.well-known/security.txt)'])+'\n')

          discovery='''\n    <link rel="alternate" type="application/rss+xml" title="Englishire Journal" href="https://englishire.com/feed.xml" />\n    <link rel="alternate" type="application/feed+json" title="Englishire Journal JSON Feed" href="https://englishire.com/feed.json" />\n'''
          footer_links='<a href="accessibility.html">Accessibility</a><a href="editorial-policy.html">Editorial Policy</a><a href="permissions.html">Permissions</a>'
          for p in html_files:
              t=read(p); before={tag:len(re.findall(fr'<{tag}\b',t,re.I)) for tag in ('section','article','form','script')}
              if p.name in journal_names and 'application/rss+xml' not in t:
                  t=t.replace('</head>',discovery+'  </head>',1)
              if 'site-footer__legal' in t and 'accessibility.html' not in t:
                  t=re.sub(r'(<div[^>]*class=["\'][^"\']*site-footer__legal[^"\']*["\'][^>]*>)(.*?)(</div>)',lambda m:m.group(1)+m.group(2)+footer_links+m.group(3),t,count=1,flags=re.I|re.S)
              after={tag:len(re.findall(fr'<{tag}\b',t,re.I)) for tag in ('section','article','form','script')}
              if before!=after: raise SystemExit(f'Structural marker count changed in {p.name}: {before} -> {after}')
              write(p,t)

          required=['feed.xml','feed.json','llms.txt','llms-full.txt','humans.txt','.well-known/security.txt','sitemap.xml','sitemap-pages.xml','sitemap-journal.xml','sitemap-images.xml',*INSTITUTIONAL]
          for f in required:
              if not Path(f).exists() or Path(f).stat().st_size < 20: raise SystemExit(f'Missing or empty: {f}')
          for f in ('feed.xml','sitemap.xml','sitemap-pages.xml','sitemap-journal.xml','sitemap-images.xml'):
              import xml.etree.ElementTree as ET; ET.parse(f)
          json.loads(read('feed.json'))
          print('Generated discoverability infrastructure:', ', '.join(required))
          PY
          python /tmp/build_discovery.py
      - name: Commit generated files
        run: |
          git config user.name "Englishire Automation"
          git config user.email "info@englishire.com"
          git add -- '*.html' robots.txt sitemap*.xml feed.xml feed.json llms.txt llms-full.txt humans.txt .well-known/security.txt
          git commit -m "Add web and AI discoverability infrastructure"
          git rm .github/workflows/build-discoverability.yml
          git commit -m "Remove discoverability builder"
          git push origin HEAD:agent/discoverability-infrastructure
