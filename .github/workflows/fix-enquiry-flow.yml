name: Fix enquiry flow

on:
  push:
    branches: [agent/fix-enquiry-flow]
    paths: [.github/workflows/fix-enquiry-flow.yml]

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-enquiry-flow
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Repair enquiry experience
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace(path, old, new):
              p = Path(path)
              text = p.read_text(encoding='utf-8')
              if old not in text:
                  raise SystemExit(f'Expected text not found in {path}: {old[:80]!r}')
              p.write_text(text.replace(old, new), encoding='utf-8', newline='\n')

          replace('contact.html', '''<form
            action="https://formspree.io/f/xbdnydnb"
            class="email-enquiry-form"
            id="englishire-email-enquiry-form"
            method="post"
          >''', '''<form
            action="https://formspree.io/f/xbdnydnb"
            class="email-enquiry-form"
            id="englishire-email-enquiry-form"
            method="post"
            data-success-page="thank-you.html"
          >''')

          replace('contact.html', '''    <a class="button button--text" href="mailto:info@englishire.com">Email Englishire Directly</a>''', '''    <a
              class="button button--text"
              href="mailto:info@englishire.com?subject=Teacher%20cover%20enquiry"
              data-direct-email
              data-email-address="info@englishire.com"
            >Email Englishire Directly</a>''')

          replace('contact.html', '''  <p aria-live="polite" class="email-enquiry-form__status" id="englishire-email-enquiry-status"></p>''', '''  <p aria-live="polite" class="email-enquiry-form__status" id="englishire-email-enquiry-status"></p>
            <p class="form-field__hint email-enquiry-form__email-fallback">
              If your email application does not open, write to
              <a href="mailto:info@englishire.com">info@englishire.com</a>.
            </p>''')

          replace('contact.html', '''          This website works best with JavaScript enabled. Without JavaScript,
                    the enquiry form will use your email application directly. You may
                    alternatively write to info@englishire.com.''', '''          This website works best with JavaScript enabled. Without JavaScript,
                    the form will be submitted through Formspree and may display its own
                    confirmation page. You may also write to info@englishire.com.''')

          replace('thank-you.html', '<body>', '<body class="thank-you-page">')
          replace('thank-you.html', '''<p class="eyebrow">Enquiry Email</p>

                    <h1>Your enquiry email is ready for review.</h1>

                    <p class="service-hero__lead">
                      If you have sent your enquiry email, thank you for taking the time
                      to contact Englishire.
                    </p>

                    <p class="service-hero__summary">
                      The contact form prepares an email but does not send it. Once you
                      have reviewed and sent that email from your own email application,
                      Englishire can consider the assignment before responding.
                    </p>''', '''<p class="eyebrow">Enquiry Submitted</p>

                    <h1>Thank you. Your enquiry has been submitted successfully.</h1>

                    <p class="service-hero__lead">
                      Englishire has received the information you provided.
                    </p>

                    <p class="service-hero__summary">
                      We will review the assignment promptly and reply as soon as possible.
                      Urgent enquiries are prioritised, while response time may depend on the
                      timetable, location and information that still requires confirmation.
                    </p>''')
          replace('thank-you.html', '<h2>What happens once you send the email?</h2>', '<h2>What happens next?</h2>')
          replace('thank-you.html', '''Every enquiry received by email is read individually so that the
                      school, timetable, learner groups and teaching requirements may be
                      understood properly.''', '''Every submitted enquiry is reviewed individually so that the school,
                      timetable, learner groups and teaching requirements can be understood
                      before the next step is confirmed.''')
          replace('thank-you.html', '''<h3>We Read</h3>
                        <p>
                          Every enquiry is reviewed by a person rather than accepted automatically.
                          The details matter.
                        </p>''', '''<h3>Received</h3>
                        <p>
                          Your enquiry has reached Englishire successfully. There is no need to
                          send it again.
                        </p>''')
          replace('thank-you.html', '''<h3>We Consider</h3>
                        <p>
                          Availability, suitability, location, timetable and the nature of
                          the assignment are reviewed before any promise is made.
                        </p>''', '''<h3>Reviewed</h3>
                        <p>
                          We assess availability, suitability, travel, timetable and the
                          practical requirements of the assignment.
                        </p>''')
          replace('thank-you.html', '''<h3>We Reply</h3>
                        <p>
                          Once the assignment has been reviewed, we will
                          respond as soon as reasonably possible with the next appropriate
                          step.
                        </p>''', '''<h3>Answered</h3>
                        <p>
                          We will reply as soon as possible with any questions, availability
                          information or the next practical step.
                        </p>''')
          replace('thank-you.html', '''<h2>
                      Your enquiry will be reviewed before any cover is confirmed.
                    </h2>

                    <p>
                      We believe that schools deserve thoughtful replies rather than
                        hurried assurances. That principle guides every enquiry received.
                    </p>''', '''<h2>
                      A prompt reply begins with a careful review of the assignment.
                    </h2>

                    <p>
                      Englishire will respond clearly and without unnecessary delay. Cover is
                      confirmed only when the assignment, suitability and availability have
                      been established.
                    </p>''')
          for href in ('teacher-cover.html', 'questions.html', 'journal.html'):
              replace('thank-you.html', f'class="button button--secondary" href="{href}"', f'class="button button--light" href="{href}"')
          replace('thank-you.html', '''<section class="enquiry-strip">
                  <div class="site-shell">
                    <h2>Sent enquiries are given the consideration they deserve.</h2>

                    <p>
                      Once your email has been sent, Englishire can learn more about your
                      school and consider what may properly be offered.
                    </p>
                  </div>
                </section>''', '''<section class="enquiry-strip">
                  <div class="site-shell enquiry-strip__inner">
                    <div class="enquiry-strip__content">
                      <p class="section-label">Response</p>
                      <h2>Your enquiry is now with Englishire.</h2>
                      <p>
                        We will review it promptly and contact you at the email address supplied
                        in the form. For urgent changes, email
                        <a href="mailto:info@englishire.com">info@englishire.com</a>.
                      </p>
                    </div>
                  </div>
                </section>''')

          old = '''    const status = getElement("#englishire-email-enquiry-status");
              const submitButton = form.querySelector('button[type="submit"]');

              form.addEventListener("submit", async (event) => {
                event.preventDefault();

                if (!form.reportValidity()) {
                  if (status) {
                    status.textContent =
                      "Kindly complete the required fields before sending your enquiry.";
                  }

                  return;
                }

                if (status) {
                  status.textContent = "Your enquiry is being sent securely.";
                }

                form.setAttribute("aria-busy", "true");

                if (submitButton instanceof HTMLButtonElement) {
                  submitButton.disabled = true;
                  submitButton.textContent = "Sending…";
                }

                try {
                  const response = await fetch(form.action, {
                    method: "POST",
                    body: new FormData(form),
                    headers: {
                      Accept: "application/json",
                    },
                  });

                  if (!response.ok) {
                    throw new Error("The enquiry service did not accept the submission.");
                  }

                  window.location.assign("thank-you.html");
                } catch (error) {
                  if (status) {
                    status.textContent =
                      "We could not send your enquiry just now. Kindly try again or email info@englishire.com directly.";
                  }

                  form.removeAttribute("aria-busy");

                  if (submitButton instanceof HTMLButtonElement) {
                    submitButton.disabled = false;
                    submitButton.textContent = "Send Enquiry";
                  }
                }
              });'''
          new = '''    const status = getElement("#englishire-email-enquiry-status");
              const submitButton = form.querySelector('button[type="submit"]');
              const directEmailLink = form.querySelector("[data-direct-email]");
              const successPage = form.dataset.successPage || "thank-you.html";

              if (directEmailLink instanceof HTMLAnchorElement) {
                directEmailLink.addEventListener("click", () => {
                  const emailAddress =
                    directEmailLink.dataset.emailAddress || "info@englishire.com";

                  if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(emailAddress).catch(() => {});
                  }

                  if (status) {
                    status.textContent =
                      "Your email application should open. The address info@englishire.com has also been copied where supported.";
                  }
                });
              }

              form.addEventListener("submit", async (event) => {
                event.preventDefault();

                if (!form.reportValidity()) {
                  if (status) {
                    status.textContent =
                      "Complete the required fields before sending your enquiry.";
                  }

                  return;
                }

                if (status) {
                  status.textContent = "Sending your enquiry securely…";
                }

                form.setAttribute("aria-busy", "true");

                if (submitButton instanceof HTMLButtonElement) {
                  submitButton.disabled = true;
                  submitButton.textContent = "Sending…";
                }

                const controller = new AbortController();
                const timeout = window.setTimeout(() => controller.abort(), 20000);

                try {
                  const response = await fetch(form.action, {
                    method: "POST",
                    body: new FormData(form),
                    headers: {
                      Accept: "application/json",
                    },
                    signal: controller.signal,
                  });

                  let responseData = null;

                  try {
                    responseData = await response.json();
                  } catch (error) {
                    responseData = null;
                  }

                  if (!response.ok) {
                    const serviceMessage =
                      responseData && Array.isArray(responseData.errors)
                        ? responseData.errors
                            .map((item) => item && item.message)
                            .filter(Boolean)
                            .join(" ")
                        : "";

                    throw new Error(
                      serviceMessage || "The enquiry service did not accept the submission."
                    );
                  }

                  try {
                    window.sessionStorage.setItem(
                      "englishire-enquiry-submitted",
                      new Date().toISOString()
                    );
                  } catch (error) {
                    // The confirmation page remains valid when storage is unavailable.
                  }

                  window.location.assign(new URL(successPage, window.location.href).href);
                } catch (error) {
                  const timedOut =
                    error instanceof DOMException && error.name === "AbortError";

                  if (status) {
                    status.textContent = timedOut
                      ? "The enquiry service took too long to respond. Please try again, or email info@englishire.com directly."
                      : "Your enquiry could not be sent just now. Please try again, or email info@englishire.com directly.";
                  }

                  form.removeAttribute("aria-busy");

                  if (submitButton instanceof HTMLButtonElement) {
                    submitButton.disabled = false;
                    submitButton.textContent = "Send Enquiry";
                    submitButton.focus();
                  }
                } finally {
                  window.clearTimeout(timeout);
                }
              });'''
          replace('script.js', old, new)

          css = Path('critical-fixes.css')
          text = css.read_text(encoding='utf-8')
          marker = '/* Enquiry flow and confirmation page */'
          if marker not in text:
              text += '''\n\n/* Enquiry flow and confirmation page */
          .email-enquiry-form__email-fallback {
            margin-top: 0.8rem;
            color: var(--muted);
          }

          .email-enquiry-form__email-fallback a,
          .thank-you-page .enquiry-strip a {
            color: inherit;
            border-bottom: 1px solid currentColor;
          }

          .thank-you-page .service-hero__summary {
            max-width: 58rem;
          }

          .thank-you-page .about-englishire .service-hero__actions {
            position: relative;
            z-index: 1;
            flex-wrap: wrap;
          }

          .thank-you-page .about-englishire .button--light {
            color: var(--royal-navy-deep);
            background: var(--ivory-light);
            border-color: var(--crown-gold-light);
          }

          .thank-you-page .about-englishire .button--light:hover,
          .thank-you-page .about-englishire .button--light:focus-visible {
            color: var(--white);
            background: var(--crimson);
            border-color: var(--crimson);
          }

          .thank-you-page .about-englishire .button--primary {
            border-color: var(--crown-gold-light);
          }

          .thank-you-page .enquiry-strip__content p {
            color: rgba(255, 255, 255, 0.84);
          }
          '''
              css.write_text(text, encoding='utf-8', newline='\n')
          PY
          node --check script.js
          python - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          import xml.etree.ElementTree as ET

          class Parser(HTMLParser):
              pass
          for name in ('contact.html', 'thank-you.html'):
              Parser().feed(Path(name).read_text(encoding='utf-8'))
          assert 'prepares an email but does not send it' not in Path('thank-you.html').read_text(encoding='utf-8')
          assert 'data-direct-email' in Path('contact.html').read_text(encoding='utf-8')
          assert 'AbortController' in Path('script.js').read_text(encoding='utf-8')
          PY
          rm .github/workflows/fix-enquiry-flow.yml
          git config user.name "Englishire automation"
          git config user.email "info@englishire.com"
          git add contact.html thank-you.html script.js critical-fixes.css .github/workflows/fix-enquiry-flow.yml
          git commit -m "Fix enquiry submission and confirmation flow"
          git push origin HEAD:agent/fix-enquiry-flow