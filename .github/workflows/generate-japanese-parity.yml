name: Validate Japanese parity site

on:
  push:
    branches:
      - agent/japanese-post-merge-refinement
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  validate-japanese:
    if: ${{ github.event_name == 'pull_request' || !contains(github.event.head_commit.message, '[generated-ja]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install generator dependencies
        run: pip install beautifulsoup4 deep-translator

      - name: Require reviewed source-keyed translations
        run: python scripts/check_japanese_strict_coverage.py

      - name: Regenerate reviewed Japanese counterparts
        run: python scripts/generate_japanese_site_release.py

      - name: Run Japanese release parity audit
        run: python scripts/check_japanese_release.py

      - name: Run Japanese editorial quality audit
        run: python scripts/check_japanese_quality.py

      - name: Run Japanese naturalness audit
        id: naturalness
        continue-on-error: true
        run: python scripts/check_japanese_naturalness.py

      - name: Run existing static-site validation
        run: |
          python -m compileall scripts
          if [ -f package.json ]; then npm install --ignore-scripts --no-audit --no-fund; fi
          if npm run | grep -q 'validate'; then npm run validate; fi

      - name: Commit deterministic Japanese pages
        run: |
          git config user.name "Englishire parity bot"
          git config user.email "actions@users.noreply.github.com"
          git add ja scripts/ja_translation_cache.json scripts/naturalness_failures.txt
          if git diff --cached --quiet; then
            echo "No generated changes"
          else
            git commit -m "Apply post-merge Japanese refinements [generated-ja]"
            git push origin HEAD:${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}
          fi

      - name: Enforce Japanese naturalness audit
        if: steps.naturalness.outcome == 'failure'
        run: exit 1
