name: Generate Japanese parity site

on:
  push:
    branches:
      - agent/japanese-editorial-corrections
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    if: ${{ github.event_name == 'pull_request' || !contains(github.event.head_commit.message, '[generated-ja]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/japanese-editorial-corrections
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install generator dependencies
        run: pip install beautifulsoup4 deep-translator

      - name: Generate reviewed Japanese counterparts
        run: python scripts/generate_japanese_site_reviewed.py

      - name: Run strict Japanese parity audit
        run: python scripts/check_japanese_parity.py

      - name: Run Japanese brand and contact quality audit
        run: python scripts/check_japanese_quality.py

      - name: Run existing static-site validation
        run: |
          python -m compileall scripts
          if [ -f package.json ]; then npm install --ignore-scripts --no-audit --no-fund; fi
          if npm run | grep -q 'validate'; then npm run validate; fi

      - name: Commit validated Japanese pages to correction branch
        if: ${{ github.event_name == 'push' }}
        run: |
          git config user.name "Englishire parity bot"
          git config user.email "actions@users.noreply.github.com"
          git add ja scripts/ja_translation_cache.json
          if git diff --cached --quiet; then
            echo "No generated changes"
          else
            git commit -m "Correct Japanese company voice and mistranslations [generated-ja]"
            git push origin HEAD:agent/japanese-editorial-corrections
          fi
