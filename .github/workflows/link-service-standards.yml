name: Link Service Standards

on:
  push:
    branches: [agent/link-service-standards]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  update-links:
    if: github.ref_name == 'agent/link-service-standards' || github.head_ref == 'agent/link-service-standards'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/link-service-standards
          fetch-depth: 0
      - name: Add sitewide and contextual links
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          footer_link = '<a href="service-standards.html">Service Standards</a>'
          updated = []

          for path in sorted(Path('.').glob('*.html')):
              text = path.read_text(encoding='utf-8')
              if 'site-footer__legal' not in text or 'href="service-standards.html"' in text:
                  continue

              pattern = r'(<div class="site-footer__legal">\s*)'
              text, count = re.subn(pattern, r'\1' + footer_link + '\n', text, count=1)
              if count != 1:
                  raise SystemExit(f'Could not add footer link to {path}')
              path.write_text(text, encoding='utf-8', newline='\n')
              updated.append(str(path))

          contact = Path('contact.html')
          text = contact.read_text(encoding='utf-8')
          contextual = '''<p class="email-enquiry-form__notice">
  Before submitting, review our <a href="service-standards.html">Service Standards</a>
  for response, confirmation, commercial and safeguarding expectations.
</p>
'''
          if contextual not in text:
              marker = '</header>\n<form\n'
              if marker not in text:
                  raise SystemExit('Could not locate contact form introduction')
              text = text.replace(marker, '</header>\n' + contextual + '<form\n', 1)
              contact.write_text(text, encoding='utf-8', newline='\n')
              if 'contact.html' not in updated:
                  updated.append('contact.html')

          for trigger_name in ('.link-service-standards-trigger', '.link-service-standards-trigger-2', '.link-service-standards-trigger-3'):
              trigger = Path(trigger_name)
              if trigger.exists():
                  trigger.unlink()

          if not updated:
              raise SystemExit('No HTML files were updated')

          print(f'Updated {len(updated)} files')
          PY

          python - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path

          for path in Path('.').glob('*.html'):
              HTMLParser().feed(path.read_text(encoding='utf-8'))

          contact = Path('contact.html').read_text(encoding='utf-8')
          assert 'Before submitting, review our' in contact
          assert 'href="service-standards.html"' in contact

          pages_with_footer = [p for p in Path('.').glob('*.html') if 'site-footer__legal' in p.read_text(encoding='utf-8')]
          missing = [str(p) for p in pages_with_footer if 'href="service-standards.html"' not in p.read_text(encoding='utf-8')]
          assert not missing, missing
          print(f'Validated {len(pages_with_footer)} linked footers')
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Link service standards throughout site"
          git push origin HEAD:agent/link-service-standards
