name: Remove direct email button

on:
  push:
    branches: [agent/remove-direct-email-button]
    paths: [.github/workflows/remove-direct-email-button.yml]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/remove-direct-email-button
          fetch-depth: 0
      - name: Remove obsolete direct-email control
        run: |
          python - <<'PY'
          from pathlib import Path

          contact = Path('contact.html')
          html = contact.read_text(encoding='utf-8')
          old = '''    <a
    class="button button--text"
    href="mailto:info@englishire.com?subject=Teacher%20cover%20enquiry"
    data-direct-email
    data-email-address="info@englishire.com"
  >Email Englishire Directly</a>
'''
          if old not in html:
              raise SystemExit('Direct-email button block not found')
          html = html.replace(old, '', 1)

          fallback = '''  <p class="form-field__hint email-enquiry-form__email-fallback">
    If your email application does not open, write to
    <a href="mailto:info@englishire.com">info@englishire.com</a>.
  </p>
'''
          if fallback not in html:
              raise SystemExit('Direct-email fallback block not found')
          html = html.replace(fallback, '', 1)
          contact.write_text(html, encoding='utf-8', newline='\n')

          script = Path('contact-form.js')
          js = script.read_text(encoding='utf-8')
          js = js.replace('  const directEmailLink = form.querySelector("[data-direct-email]");\n', '', 1)
          start = js.find('  if (directEmailLink instanceof HTMLAnchorElement) {')
          end_marker = '  form.addEventListener("submit", async (event) => {'
          end = js.find(end_marker)
          if start == -1 or end == -1 or end <= start:
              raise SystemExit('Direct-email JavaScript block not found')
          js = js[:start] + js[end:]
          script.write_text(js, encoding='utf-8', newline='\n')

          css = Path('critical-fixes.css')
          text = css.read_text(encoding='utf-8')
          css_block = '''.email-enquiry-form__email-fallback {
  margin-top: 0.8rem;
  color: var(--muted);
}

.email-enquiry-form__email-fallback a,
'''
          if css_block not in text:
              raise SystemExit('Direct-email CSS block not found')
          text = text.replace(css_block, '', 1)
          text = text.replace('.thank-you-page .enquiry-strip a {', '.thank-you-page .enquiry-strip a {', 1)
          css.write_text(text, encoding='utf-8', newline='\n')
          PY

          node --check contact-form.js
          python - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path

          class Parser(HTMLParser):
              pass

          for name in ('contact.html',):
              Parser().feed(Path(name).read_text(encoding='utf-8'))

          html = Path('contact.html').read_text(encoding='utf-8')
          js = Path('contact-form.js').read_text(encoding='utf-8')
          css = Path('critical-fixes.css').read_text(encoding='utf-8')
          assert 'Email Englishire Directly' not in html
          assert 'data-direct-email' not in html
          assert 'email-enquiry-form__email-fallback' not in html
          assert 'directEmailLink' not in js
          assert 'email-enquiry-form__email-fallback' not in css
          assert '<button class="button button--primary" type="submit">Send Enquiry</button>' in html
          assert 'mailto:info@englishire.com' in html
          PY

          git config user.name "Englishire Automation"
          git config user.email "info@englishire.com"
          git add contact.html contact-form.js critical-fixes.css
          git commit -m "Remove direct email button"
          git push origin HEAD:agent/remove-direct-email-button

          git rm .github/workflows/remove-direct-email-button.yml
          git commit -m "Remove temporary direct email workflow"
          git push origin HEAD:agent/remove-direct-email-button
