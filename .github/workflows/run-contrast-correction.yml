name: Run contrast correction

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/contrast-correction
      - name: Apply contrast correction
        shell: python
        run: |
          from pathlib import Path
          path = Path('style.css')
          css = path.read_text(encoding='utf-8')
          marker = '/* CONTRAST AND COLOUR CORRECTIONS */'
          if marker in css:
              raise SystemExit('Corrections already present')
          workflow = Path('.github/workflows/apply-contrast-correction.yml').read_text(encoding='utf-8')
          corrections = workflow.split("corrections = r'''", 1)[1].split("'''", 1)[0]
          path.write_text(css.rstrip() + corrections + '\n', encoding='utf-8')
          Path('.github/workflows/apply-contrast-correction.yml').unlink()
      - name: Commit correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add style.css .github/workflows/apply-contrast-correction.yml
          git commit -m "Correct section contrast and button colours"
          git push origin HEAD:agent/contrast-correction
