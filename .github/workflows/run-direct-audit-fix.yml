name: Run direct audit fix

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/direct-audit-fix
      - name: Apply corrections directly to style.css
        shell: python
        run: |
          from pathlib import Path
          path = Path('style.css')
          css = path.read_text(encoding='utf-8')
          marker = '/* DIRECT SITE-WIDE AUDIT CORRECTIONS */'
          if marker in css:
              raise SystemExit('Corrections already present')
          workflow = Path('.github/workflows/apply-direct-audit-fix.yml').read_text(encoding='utf-8')
          corrections = workflow.split("corrections = r'''", 1)[1].split("'''", 1)[0]
          path.write_text(css.rstrip() + corrections + '\n', encoding='utf-8')
          Path('.github/workflows/apply-direct-audit-fix.yml').unlink()
      - name: Commit stylesheet correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add style.css .github/workflows/apply-direct-audit-fix.yml
          git commit -m "Apply direct site-wide audit corrections"
          git push origin HEAD:agent/direct-audit-fix
