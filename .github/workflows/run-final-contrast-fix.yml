name: Run final page-specific contrast fix

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/final-page-contrast
      - name: Apply verified page-specific contrast corrections
        shell: python
        run: |
          from pathlib import Path
          path = Path('style.css')
          css = path.read_text(encoding='utf-8')
          marker = '/* FINAL PAGE-SPECIFIC CONTRAST CORRECTIONS */'
          if marker in css:
              raise SystemExit('Corrections already present')
          corrections = r'''

/* FINAL PAGE-SPECIFIC CONTRAST CORRECTIONS */

/* Actual dark sections used by the affected pages. */
.service-situations,
#englishire-process-route,
#englishire-process-stages,
.journal-masthead,
.journal-start,
.journal-latest,
.journal-standard-panel,
.about-englishire:not(.englishire-principle) {
  color: var(--ivory-light);
}

.service-situations h1,
.service-situations h2,
.service-situations h3,
.service-situations h4,
.service-situations p,
.service-situations li,
.service-situations strong,
.service-situations span,
#englishire-process-route h1,
#englishire-process-route h2,
#englishire-process-route h3,
#englishire-process-route h4,
#englishire-process-route p,
#englishire-process-route li,
#englishire-process-route strong,
#englishire-process-route span,
#englishire-process-stages h1,
#englishire-process-stages h2,
#englishire-process-stages h3,
#englishire-process-stages h4,
#englishire-process-stages p,
#englishire-process-stages li,
#englishire-process-stages strong,
#englishire-process-stages span,
.journal-masthead h1,
.journal-masthead h2,
.journal-masthead h3,
.journal-masthead p,
.journal-start h1,
.journal-start h2,
.journal-start h3,
.journal-start p,
.journal-start li,
.journal-start strong,
.journal-start span,
.journal-latest h1,
.journal-latest h2,
.journal-latest h3,
.journal-latest h4,
.journal-latest p,
.journal-latest li,
.journal-latest strong,
.journal-latest span,
.journal-standard-panel h1,
.journal-standard-panel h2,
.journal-standard-panel h3,
.journal-standard-panel p,
.journal-standard-panel li,
.journal-standard-panel strong,
.journal-standard-panel span,
.about-englishire:not(.englishire-principle) h1,
.about-englishire:not(.englishire-principle) h2,
.about-englishire:not(.englishire-principle) h3,
.about-englishire:not(.englishire-principle) h4,
.about-englishire:not(.englishire-principle) p,
.about-englishire:not(.englishire-principle) li,
.about-englishire:not(.englishire-principle) strong,
.about-englishire:not(.englishire-principle) span {
  color: var(--ivory-light) !important;
}

.service-situations .section-label,
.service-situations .eyebrow,
.service-situations .story-category,
.service-situations .situation-item__number,
.service-situations .situation-item__detail,
#englishire-process-route .section-label,
#englishire-process-route .eyebrow,
#englishire-process-route .story-category,
#englishire-process-route .process-route__number,
#englishire-process-stages .section-label,
#englishire-process-stages .eyebrow,
#englishire-process-stages .story-category,
#englishire-process-stages .process-item__number,
.journal-masthead .journal-masthead__volume,
.journal-masthead .journal-masthead__kicker,
.journal-start .section-label,
.journal-start .journal-start__number,
.journal-latest .section-label,
.journal-latest .story-category,
.journal-standard-panel .section-label,
.about-englishire:not(.englishire-principle) .section-label,
.about-englishire:not(.englishire-principle) .eyebrow,
.about-englishire:not(.englishire-principle) .about-englishire__wordmark {
  color: var(--crown-gold-light) !important;
}

.service-situations .section-heading__summary,
#englishire-process-route .section-heading__summary,
#englishire-process-stages .section-heading__summary,
.journal-masthead .journal-masthead__subtitle,
.journal-masthead .journal-masthead__creed,
.journal-start p,
.journal-latest p,
.journal-standard-panel p,
.about-englishire:not(.englishire-principle) .about-englishire__descriptor,
.about-englishire:not(.englishire-principle) p,
.about-englishire:not(.englishire-principle) span {
  color: rgba(255, 255, 255, 0.84) !important;
}

/* Links and buttons must remain legible before hover. */
.service-situations a:not(.button),
#englishire-process-route a:not(.button),
#englishire-process-stages a:not(.button),
.journal-masthead a:not(.button),
.journal-start a:not(.button),
.journal-latest a:not(.button),
.journal-standard-panel a:not(.button),
.about-englishire:not(.englishire-principle) a:not(.button) {
  color: var(--crown-gold-light) !important;
  border-color: var(--crown-gold) !important;
}

.service-situations .button,
#englishire-process-route .button,
#englishire-process-stages .button,
.journal-masthead .button,
.journal-start .button,
.journal-latest .button,
.journal-standard-panel .button,
.about-englishire:not(.englishire-principle) .button {
  color: var(--royal-navy-deep) !important;
  background: var(--crown-gold-light) !important;
  border-color: var(--crown-gold-light) !important;
}

.service-situations .button:hover,
.service-situations .button:focus-visible,
#englishire-process-route .button:hover,
#englishire-process-route .button:focus-visible,
#englishire-process-stages .button:hover,
#englishire-process-stages .button:focus-visible,
.journal-masthead .button:hover,
.journal-masthead .button:focus-visible,
.journal-start .button:hover,
.journal-start .button:focus-visible,
.journal-latest .button:hover,
.journal-latest .button:focus-visible,
.journal-standard-panel .button:hover,
.journal-standard-panel .button:focus-visible,
.about-englishire:not(.englishire-principle) .button:hover,
.about-englishire:not(.englishire-principle) .button:focus-visible {
  color: var(--white) !important;
  background: var(--crimson) !important;
  border-color: var(--crimson) !important;
}
'''
          path.write_text(css.rstrip() + corrections + '\n', encoding='utf-8')
      - name: Commit corrected stylesheet
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add style.css
          git commit -m "Apply final page-specific contrast corrections"
          git push origin HEAD:agent/final-page-contrast