name: Update journal case-study thumbnail

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/update-journal-case-study-thumbnail.yml

permissions:
  contents: write

jobs:
  update-thumbnail:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Replace journal-only case-study thumbnail
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("journal.html")
          text = path.read_text(encoding="utf-8")
          old = '''                src="media-school-collapse.png"
                alt="Editorial image for the school collapse case study"
                width="1200"
                height="900"'''
          new = '''                src="school-collapse-after-three-decades-article.png"
                alt="An empty corridor in a former Tokyo school building"
                width="1672"
                height="941"'''

          count = text.count(old)
          if count != 1:
              raise SystemExit(f"Expected exactly one journal case-study image block, found {count}")

          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY

      - name: Commit journal update and remove temporary workflow
        run: |
          rm .github/workflows/update-journal-case-study-thumbnail.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add journal.html .github/workflows/update-journal-case-study-thumbnail.yml
          git commit -m "Use article image for journal case-study thumbnail"
          git push
