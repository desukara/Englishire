name: Update school collapse article hero

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/update-school-collapse-hero.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update article image references
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('school-collapse-after-three-decades.html')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              'https://englishire.com/images/journal/school-collapse-after-three-decades.jpg',
              'https://englishire.com/school-collapse-after-three-decades-article.png',
          )
          text = text.replace(
              'images/journal/school-collapse-after-three-decades.jpg',
              'school-collapse-after-three-decades-article.png',
          )
          text = text.replace(
              'An empty preschool classroom after a school closure',
              'An empty corridor in a former Tokyo school building',
          )
          text = text.replace(
              'width="1600"\n            height="900"',
              'width="1672"\n            height="941"',
          )
          path.write_text(text, encoding='utf-8')
          PY
      - name: Remove temporary workflow and commit
        run: |
          rm .github/workflows/update-school-collapse-hero.yml
          git config user.name "Englishire Repository Update"
          git config user.email "actions@users.noreply.github.com"
          git add school-collapse-after-three-decades.html .github/workflows/update-school-collapse-hero.yml
          git commit -m "Use article hero for school collapse case study"
          git push
